version: 2

models:
  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: customer_order_freq
    columns:
      - name: order_frequency_band
        tests:
          - not_null
      - name: num_customers
        tests:
          - not_null

  - name: customer_churn_metrics
    columns:
      - name: order_month
        tests:
          - not_null
      - name: customer_type
        tests:
          - not_null
          - accepted_values:
              values: ['New', 'Returning']